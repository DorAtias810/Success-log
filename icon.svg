  <path d="M256 250 C210 250 176 218 168 168 C220 166 256 200 256 250 Z" fill="url(#leaf)"/>
  <path d="M256 226 C300 222 336 188 346 140 C296 140 262 176 256 226 Z" fill="url(#leaf)"/>
