      <stop offset="0" stop-color="#f9c79a"/>
      <stop offset="1" stop-color="#ef9d63"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe0bd"/>
      <stop offset="1" stop-color="#8bbf8a"/>
